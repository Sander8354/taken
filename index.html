<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Taken</title>
<meta name="theme-color" content="#1c1c1e">
<link rel="manifest" id="mflink">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1c1c1e;--sf:#2c2c2e;--sf2:#3a3a3c;--bd:#48484a;
  --ac:#4fc3f7;--tx:#ffffff;--mu:#8e8e93;--ok:#30d158;--err:#ff453a;--r:12px;
  --f:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:var(--f);font-size:16px;min-height:100dvh;display:flex;flex-direction:column}
header{background:var(--bg);padding:16px 16px 0;display:flex;flex-direction:column;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.hdr-top h1{font-size:28px;font-weight:700;letter-spacing:-.3px}
.hdr-right{display:flex;align-items:center;gap:10px;position:relative}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#1c1c1e;cursor:pointer;flex-shrink:0}
.dots-btn{background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:4px;align-items:center}
.dots-btn span{display:block;width:4px;height:4px;border-radius:50%;background:var(--mu)}
.menu-popup{display:none;position:absolute;top:46px;right:0;background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden;min-width:190px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.menu-popup.open{display:block}
.menu-item{width:100%;background:none;border:none;border-bottom:1px solid var(--bd);color:var(--tx);padding:14px 16px;font-family:var(--f);font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px;text-align:left}
.menu-item:last-child{border-bottom:none}
.menu-item:hover{background:var(--sf2)}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mu);pointer-events:none}
#q{width:100%;background:var(--sf);border:none;border-radius:10px;color:var(--tx);padding:9px 12px 9px 36px;font-family:var(--f);font-size:15px;outline:none}
#q::placeholder{color:var(--mu)}
.tabs{display:flex;border-bottom:1px solid var(--bd)}
.tab{flex:1;padding:10px 6px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--mu);border-bottom:2px solid transparent;user-select:none}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.bc{display:inline-block;background:var(--sf2);border-radius:10px;padding:1px 6px;font-size:11px;margin-left:3px;color:var(--mu)}
.tab.active .bc{background:var(--ac);color:#1c1c1e}
main{flex:1;overflow-y:auto;padding-bottom:90px}
.dg{margin-top:8px}
.dh{font-size:16px;font-weight:700;padding:14px 16px 6px}
.dh.today{color:var(--ac)}
.tr{display:flex;align-items:flex-start;padding:12px 16px;border-bottom:1px solid var(--bd);gap:14px}
.chk{width:24px;height:24px;border-radius:50%;border:2px solid var(--mu);background:transparent;flex-shrink:0;cursor:pointer;margin-top:1px;transition:background .2s,border-color .2s;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent}
.chk.gedaan{background:var(--ok);border-color:var(--ok);color:#fff}
.tr.fade-out{opacity:0;transition:opacity .4s ease,max-height .4s ease .1s;max-height:0!important;overflow:hidden;padding-top:0!important;padding-bottom:0!important;border:none!important}
.tb{flex:1;min-width:0;cursor:pointer}
.tt{font-size:16px;line-height:1.4;word-break:break-word}
.tmeta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap}
.tmeta .rep-ic{color:var(--mu);font-size:14px}
.tmeta .tag{font-size:12px;color:var(--mu)}
.star-btn{background:none;border:none;cursor:pointer;padding:4px;flex-shrink:0;line-height:1}
.clock-btn{background:none;border:none;cursor:pointer;padding:4px;flex-shrink:0;line-height:1;color:var(--mu)}
.clock-btn:hover{color:var(--ac)}
.empty{text-align:center;padding:60px 20px;color:var(--mu)}
.empty .ei{font-size:40px;margin-bottom:10px}
.empty p{font-size:14px;line-height:1.6}
#add-btn{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:16px;background:var(--ac);color:#1c1c1e;font-size:28px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(79,195,247,.4);z-index:60}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center}
#ov-over{align-items:center}
.ov.hidden{display:none}
.modal{background:#2c2c2e;border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-width:520px;max-height:92dvh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
.drag-bar{width:40px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 16px}
.fg{margin-bottom:14px}
.fg .flbl{display:block;font-size:12px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.inp{width:100%;background:var(--sf2);border:none;border-radius:10px;color:var(--tx);padding:11px 13px;font-family:var(--f);font-size:15px;outline:none}
.inp:focus{outline:2px solid var(--ac)}
.inp option{background:var(--sf2)}
textarea.inp{resize:vertical;min-height:64px}
.hsec{background:var(--sf2);border-radius:var(--r);padding:14px;margin-top:8px;flex-direction:column;display:none}
.hsec.show{display:flex}
.hblok{padding:12px 0;border-bottom:1px solid var(--bd)}
.hblok:last-child{border-bottom:none;padding-bottom:0}
.hblok:first-child{padding-top:0}
.hlbl{font-size:13px;font-weight:600;margin-bottom:8px}
.elke-rij{display:flex;align-items:center;gap:8px}
.elke-rij input[type=number]{width:64px;background:#1c1c1e;border:none;border-radius:8px;color:var(--tx);padding:9px;font-family:var(--f);font-size:14px;outline:none;text-align:center}
.elke-rij input[type=number]:focus{outline:2px solid var(--ac)}
.elke-rij select{flex:1;background:#1c1c1e;border:none;border-radius:8px;color:var(--tx);padding:9px;font-family:var(--f);font-size:14px;outline:none}
.elke-rij select:focus{outline:2px solid var(--ac)}
.elke-rij select option{background:var(--sf2)}
.wdbtns{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.wd{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--bd);background:transparent;color:var(--mu);font-family:var(--f);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center}
.wd.on{background:var(--ac);border-color:var(--ac);color:#1c1c1e;font-weight:700}
.maand-opties{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.maand-opt{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.maand-opt input[type=radio]{accent-color:var(--ac);width:16px;height:16px;flex-shrink:0;cursor:pointer}
.msel{background:#1c1c1e;border:none;border-radius:8px;color:var(--tx);padding:8px 10px;font-family:var(--f);font-size:14px;outline:none;cursor:pointer}
.msel:focus{outline:2px solid var(--ac)}
.msel option{background:var(--sf2)}
.eindigt-opties{display:flex;flex-direction:column;gap:12px}
.eopt{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.eopt input[type=radio]{accent-color:var(--ac);width:16px;height:16px;flex-shrink:0;cursor:pointer}
.eopt label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;flex-wrap:wrap}
.einp{background:#1c1c1e;border:none;border-radius:8px;color:var(--tx);padding:8px 10px;font-family:var(--f);font-size:14px;outline:none}
.einp:focus{outline:2px solid var(--ac)}
.einp[type=number]{width:72px;text-align:center}
.modal-btns{display:flex;gap:8px;margin-top:18px}
.btn-ok{flex:1;background:var(--ac);color:#1c1c1e;border:none;border-radius:12px;padding:13px;font-family:var(--f);font-size:15px;font-weight:700;cursor:pointer}
.btn-cancel{background:var(--sf2);color:var(--mu);border:none;border-radius:12px;padding:13px 20px;font-family:var(--f);font-size:15px;cursor:pointer}
.notice{background:var(--sf);border-left:3px solid var(--ac);border-radius:8px;padding:12px 14px;margin:12px 16px;font-size:12px;color:var(--mu);line-height:1.7}
.notice strong{color:var(--ac);display:block;margin-bottom:4px}
.notice code{background:var(--sf2);padding:1px 5px;border-radius:3px;color:var(--ac);font-size:11px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>
</head>
<body>
<header>
  <div class="hdr-top">
    <h1>Taken</h1>
    <div class="hdr-right">
      <button class="dots-btn" id="menu-btn" title="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="menu-popup" id="menu-popup">
        <button class="menu-item" id="btn-export">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exporteer taken
        </button>
        <button class="menu-item" id="btn-import-trigger">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><line x1="12" y1="3" x2="12" y2="15"/><polyline points="7 10 12 5 17 10"/></svg>
          Importeer taken
        </button>
        <button class="menu-item" id="btn-over">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Over...
        </button>
      </div>
      <div id="auth-avatar" class="avatar" title="Inloggen">S</div>
    </div>
  </div>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" id="q" placeholder="Zoeken…">
  </div>
</header>
<input type="file" id="btn-import" accept=".json" style="display:none">
<div class="tabs">
  <div class="tab active" data-tab="upcoming">Vandaag <span class="bc" id="n-up">0</span></div>
  <div class="tab" data-tab="archive">Archief <span class="bc" id="n-ar">0</span></div>
  <div class="tab" data-tab="nodate">Lijst <span class="bc" id="n-nd">0</span></div>
</div>
<main id="main"></main>
<button id="add-btn">+</button>
<!-- OVER VENSTER -->
<div class="ov hidden" id="ov-over">
  <div class="modal" style="border-radius:var(--r);max-width:340px;margin:auto;padding:0;overflow:hidden;position:relative">
    <div style="background:var(--sf2);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)">
      <span style="font-size:15px;font-weight:600;color:var(--tx)">Over Taken</span>
      <button id="over-sluit-x" style="background:none;border:none;cursor:pointer;color:var(--mu);font-size:20px;line-height:1;padding:0 4px">&times;</button>
    </div>
    <div style="padding:20px 20px 16px;display:flex;flex-direction:column;gap:12px">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:48px;height:48px;border-radius:12px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:26px;color:#1c1c1e;flex-shrink:0">✓</div>
        <div>
          <div style="font-size:20px;font-weight:700;color:var(--tx)">Taken</div>
          <div style="font-size:13px;color:var(--mu);margin-top:2px">Versie 1.3</div>
        </div>
      </div>
      <div style="border-top:1px solid var(--bd);padding-top:12px;font-size:14px;color:var(--tx2);line-height:1.8">
        <div><span style="color:var(--mu)">Gemaakt door:</span> Sander Tas</div>
      </div>
    </div>
    <div style="padding:0 16px 16px;display:flex;justify-content:flex-end">
      <button id="over-sluit-ok" style="background:var(--ac);color:#1c1c1e;border:none;border-radius:10px;padding:10px 28px;font-family:var(--f);font-size:14px;font-weight:700;cursor:pointer">OK</button>
    </div>
  </div>
</div>

<div class="ov hidden" id="ov">
 <div class="modal">
  <div class="drag-bar"></div>
  <h2 id="m-title">Nieuwe taak</h2>
  <div class="fg">
    <span class="flbl">Omschrijving *</span>
    <textarea class="inp" id="f-desc" placeholder="Wat moet je doen of onthouden?"></textarea>
  </div>
  <div class="fg">
    <span class="flbl">Datum</span>
    <input type="date" class="inp" id="f-date">
  </div>
  <div class="fg">
    <span class="flbl">Herhaling</span>
    <select class="inp" id="f-rtype">
      <option value="none">Niet herhalen</option>
      <option value="day">Dagelijks</option>
      <option value="week">Wekelijks</option>
      <option value="month">Maandelijks</option>
      <option value="year">Jaarlijks</option>
    </select>
    <div class="hsec" id="hsec">
      <div class="hblok">
        <div class="hlbl">Elke</div>
        <div class="elke-rij">
          <input type="number" id="f-interval" min="1" max="99" value="1">
          <select id="f-eenheid">
            <option value="day">dag</option>
            <option value="week">week</option>
            <option value="month">maand</option>
            <option value="year">jaar</option>
          </select>
        </div>
        <div id="rg-wd" style="display:none">
          <div class="wdbtns">
            <button type="button" class="wd" data-d="1">ma</button>
            <button type="button" class="wd" data-d="2">di</button>
            <button type="button" class="wd" data-d="3">wo</button>
            <button type="button" class="wd" data-d="4">do</button>
            <button type="button" class="wd" data-d="5">vr</button>
            <button type="button" class="wd" data-d="6">za</button>
            <button type="button" class="wd" data-d="0">zo</button>
          </div>
        </div>
        <div id="rg-mm" style="display:none">
          <div class="maand-opties">
            <div class="maand-opt">
              <input type="radio" name="mmode" id="mm-md" value="monthday" checked>
              <label for="mm-md" style="cursor:pointer">
                <select class="msel" id="f-maanddag"></select>
              </label>
            </div>
            <div class="maand-opt">
              <input type="radio" name="mmode" id="mm-nth" value="nthweekday">
              <label for="mm-nth" style="display:flex;align-items:center;gap:8px;cursor:pointer">
                <select class="msel" id="f-nth">
                  <option value="1">Eerste</option>
                  <option value="2">Tweede</option>
                  <option value="3">Derde</option>
                  <option value="4">Vierde</option>
                  <option value="5">Laatste</option>
                </select>
                <select class="msel" id="f-nthwd">
                  <option value="1">ma</option>
                  <option value="2">di</option>
                  <option value="3">wo</option>
                  <option value="4">do</option>
                  <option value="5">vr</option>
                  <option value="6">za</option>
                  <option value="0">zo</option>
                </select>
              </label>
            </div>
          </div>
        </div>
      </div>
      <div class="hblok">
        <div class="hlbl">Eindigt</div>
        <div class="eindigt-opties">
          <div class="eopt">
            <input type="radio" name="eindigt" id="e-nooit" value="nooit" checked>
            <label for="e-nooit">Nooit</label>
          </div>
          <div class="eopt">
            <input type="radio" name="eindigt" id="e-op" value="op">
            <label for="e-op">Op <input type="date" class="einp" id="f-eindigt-op"></label>
          </div>
          <div class="eopt">
            <input type="radio" name="eindigt" id="e-na" value="na">
            <label for="e-na">Na <input type="number" class="einp" id="f-eindigt-na" min="1" max="999" value="10"> instanties</label>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-btns">
    <button class="btn-cancel" id="btn-cancel">Annuleren</button>
    <button class="btn-ok" id="btn-save">Opslaan</button>
  </div>
 </div>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, where }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const FB = {
  apiKey:            "JOUW_API_KEY",
  authDomain:        "JOUW_PROJECT.firebaseapp.com",
  projectId:         "JOUW_PROJECT_ID",
  storageBucket:     "JOUW_PROJECT.appspot.com",
  messagingSenderId: "JOUW_SENDER_ID",
  appId:             "JOUW_APP_ID"
};
const WDN = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
const NTH = ['eerste','tweede','derde','vierde','laatste'];
const ge   = id => document.getElementById(id);
const fmtD = s  => { const [y,m,d] = s.split('-'); return d+'-'+m+'-'+y; };
const dagN = s  => ['zo','ma','di','wo','do','vr','za'][new Date(s+'T12:00:00').getDay()];
const esc  = s  => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
let tasks = [], tab = 'upcoming', zoek = '', editId = null;
let fbOk = false, fbUser = null, unsub = null, auth, db;
try {
  if (FB.apiKey === 'JOUW_API_KEY') throw 0;
  const app = initializeApp(FB);
  auth = getAuth(app); db = getFirestore(app); fbOk = true;
} catch(_) {
  ge('auth-avatar').hidden = true;
  toonNotice();
  loadLocal();
}
if (fbOk) {
  onAuthStateChanged(auth, function(user) {
    fbUser = user;
    const av = ge('auth-avatar');
    if (user) {
      av.textContent = (user.displayName || '?')[0].toUpperCase();
      av.title = 'Uitloggen (' + user.displayName + ')';
      startListen();
    } else {
      av.textContent = 'S'; av.title = 'Inloggen';
      if (unsub) { unsub(); unsub = null; }
      tasks = []; render();
    }
  });
  ge('auth-avatar').addEventListener('click', function() {
    if (fbUser) signOut(auth);
    else signInWithPopup(auth, new GoogleAuthProvider());
  });
}
function startListen() {
  if (unsub) unsub();
  unsub = onSnapshot(
    query(collection(db, 'tasks'), where('uid', '==', fbUser.uid)),
    function(snap) {
      tasks = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
      autoVooruitschuiven();
      render();
    }
  );
}
function loadLocal() {
  tasks = JSON.parse(localStorage.getItem('taken_v9') || '[]');
  autoVooruitschuiven();
  render();
}
function saveLocal() { localStorage.setItem('taken_v9', JSON.stringify(tasks)); }
function toonNotice() {
  const n = document.createElement('div');
  n.className = 'notice';
  n.innerHTML = '<strong>⚙️ Firebase niet ingesteld — werkt lokaal</strong>' +
    'Ga naar <strong>console.firebase.google.com</strong>, maak een project aan, ' +
    'schakel Firestore + Google Auth in en plak je config bij <code>FB</code>.';
  ge('main').prepend(n);
}

// ── Herhalende taken automatisch doorschuiven ─────────
function autoVooruitschuiven() {
  const today = new Date().toISOString().split('T')[0];
  let changed = false;
  tasks = tasks.map(function(t) {
    if (!t.repeat || !t.date || t.date >= today) return t;
    // Taak is verlopen en heeft herhaling: schuif door naar vandaag
    let date = t.date;
    let stappen = 0;
    while (date < today && stappen < 1000) {
      const next = volgenDatum(date, t.repeat);
      if (!next || next === date) break;
      if (next > today) { date = today; break; }
      date = next;
      stappen++;
    }
    if (date < today) date = today;
    if (date !== t.date) {
      changed = true;
      return Object.assign({}, t, { date: date });
    }
    return t;
  });
  if (changed) saveLocal();
}

async function slaOp(data) {
  if (fbOk && fbUser) {
    if (editId) await updateDoc(doc(db, 'tasks', editId), data);
    else        await addDoc(collection(db, 'tasks'), Object.assign({}, data, { uid: fbUser.uid, at: Date.now() }));
  } else {
    if (editId) {
      const i = tasks.findIndex(function(t) { return t.id === editId; });

function volgenDatum(dateStr, repeat) {
  if (!repeat) return null;
  const type = repeat.type, iv = repeat.interval || 1;
  const d = new Date(dateStr + 'T12:00:00');
  if (type === 'day') {
    d.setDate(d.getDate() + iv);
  } else if (type === 'week') {
    const wds = (repeat.weekdays || []).slice().sort(function(a,b) { return a-b; });
    if (!wds.length) { d.setDate(d.getDate() + 7 * iv); }
    else {
      const cur = d.getDay(); let nxt = null;
      for (let i = 0; i < wds.length; i++) { if (wds[i] > cur) { nxt = wds[i]; break; } }
      if (nxt !== null) d.setDate(d.getDate() + (nxt - cur));
      else d.setDate(d.getDate() + (7 * iv - cur + wds[0]));
    }
  } else if (type === 'month') {
    const mm = repeat.mmode || 'monthday';
    if (mm === 'nthweekday') {
      const wd = parseInt(repeat.nthWd || 1), nth = parseInt(repeat.nth || 1);
      d.setDate(1); d.setMonth(d.getMonth() + iv);
      while (d.getDay() !== wd) d.setDate(d.getDate() + 1);
      if (nth <= 4) { d.setDate(d.getDate() + (nth - 1) * 7); }
      else {
        const mo = d.getMonth(); d.setDate(d.getDate() + 28);
        while (d.getMonth() !== mo) d.setDate(d.getDate() - 1);
        while (d.getDay() !== wd)   d.setDate(d.getDate() - 1);
      }
    } else {
      const day = parseInt(repeat.maanddag || d.getDate());

      d.setDate(Math.min(day, max));

    d.setFullYear(d.getFullYear() + iv);

}
function rLabel(r) {
  if (!r) return '';
  const type = r.type, iv = r.interval || 1; let s = '';
  if      (type === 'day')  s = iv === 1 ? 'dagelijks' : 'elke ' + iv + ' dagen';
  else if (type === 'year') s = iv === 1 ? 'jaarlijks' : 'elke ' + iv + ' jaar';
  else if (type === 'week') {
    const base = iv === 1 ? 'wekelijks' : 'elke ' + iv + ' weken';
    const days = (r.weekdays || []).map(function(d) { return WDN[d]; }).join(', ');
    s = days ? base + ' op ' + days : base;
  } else if (type === 'month') {
    const base = iv === 1 ? 'maandelijks' : 'elke ' + iv + ' maanden';
    const mm = r.mmode || 'monthday';
    if (mm === 'nthweekday') s = base + ', ' + (NTH[(parseInt(r.nth || 1)) - 1] || '') + ' ' + WDN[parseInt(r.nthWd || 1)];
    else s = base + ', dag ' + (r.maanddag || '?');
  }
  const e = r.eindigt || { type: 'nooit' };
  if (e.type === 'op' && e.op) { const p = e.op.split('-'); s += ' · tot ' + p[2] + '-' + p[1] + '-' + p[0]; }
  if (e.type === 'na' && e.na) s += ' · ' + (e.na - (e.done || 0)) + 'x resterend';
  return s;
}

function intervalDagen(t) {
  if (!t.repeat) return 999999;
  var type = t.repeat.type, iv = t.repeat.interval || 1;
  if (type === 'day')   return iv;
  if (type === 'week')  return iv * 7;
  if (type === 'month') return iv * 30;
  if (type === 'year')  return iv * 365;
  return 999999;
}
function alfa(t) { return (t.desc || '').toLowerCase(); }

function sortPerDag(arr) {
  return arr.slice().sort(function(a, b) {
    // 1. Ster voor geen ster
    var aSter = a.ster ? 0 : 1;
    var bSter = b.ster ? 0 : 1;
    if (aSter !== bSter) return aSter - bSter;
    // 2. Binnen zelfde ster-groep: niet-herhalend voor herhalend
    var aHerh = a.repeat ? 1 : 0;
    var bHerh = b.repeat ? 1 : 0;
    if (aHerh !== bHerh) return aHerh - bHerh;
    // 3. Niet-herhalend: alfabetisch
    if (!a.repeat) return alfa(a) < alfa(b) ? -1 : alfa(a) > alfa(b) ? 1 : 0;
    // 4. Herhalend: interval kort naar lang, dan alfabetisch
    var iA = intervalDagen(a), iB = intervalDagen(b);
    if (iA !== iB) return iA - iB;
    return alfa(a) < alfa(b) ? -1 : alfa(a) > alfa(b) ? 1 : 0;
  });
}

function sortLijst(arr) {
  return arr.slice().sort(function(a, b) {
    var aSter = a.ster ? 0 : 1;
    var bSter = b.ster ? 0 : 1;
    if (aSter !== bSter) return aSter - bSter;
    return alfa(a) < alfa(b) ? -1 : alfa(a) > alfa(b) ? 1 : 0;
  });
}
